<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> page title | Motion Coffee House</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        header {
            background: #16213e;
            color: white;
            padding: 15px o;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .logo img {
            height: 50px;
            width: auto;
            border-radius: 8px;
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: #e74c3c;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-animation-fill-color: transparent;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: aqua;
            text-decoration: none;
            font-weight: 500;
            padding: 8px 15px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            background: rgba(243, 156, 18, 0.2);
            color: chocolate;
        }

        .nav-links a[href="index.html"],
        .nav-links a[href="about"]
        .nav-links a[href="menu"],
        .nav-links a[href="gallery.html"],
        .nav-links a[ href="contact.html"],{
            position: relative;
            font-weight:600;
            border-radius: 5px;
        }

        .nav-links a[href="index.html"],
        .nav-links a[href="#home"],
        .nav-links a[href="about"]{
            background: rgba(52, 152, 219, 0.1);
        }

        .nav-links a[href="menu.html"],
        .nav-links a[href="contact.html"]{
            background: rgba(243, 156, 18, 0.1);
        }

        .nav-links a[href="index.html"]::before,
        .nav-links a[href="#home"]::before {
            content: "\f015"; /*home icon*/
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            margin-right: 5px;
            font-size: 0.9rem;
            color: aqua;
        }

        .nav-links a[href="about.html"]::before {
        content: "\f2bb"; /* box icon */
        font-family: "Font Awesome 6 Free";
        font-weight: 900;
        margin-right: 5px;
        font-size: 0.9rem;
        color: #2ecc71;
    }

        .nav-links a[href="menu.html"]::before {
             content: "\f466";  /* info-circle icon*/
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            margin-right: 5px;
            font-size: 0.9rem;
            color: cadetblue;
        }

         .nav-links a[href="gallery.html"]::before {
            content: "\f2bb"; /* info-circle icon*/
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            margin-right: 5px;
            font-size: 0.9rem;
            color: cornflowerblue;
        }

         .nav-links a[href="contact.html"]::before {
            content: "\f095"; /* phone icon*/
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            margin-right: 5px;
            font-size: 0.9rem;
            color: cyan;
        }

        body{
            background: burlywood;
        }

                .contact-section {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px;
            margin: 40px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .section-title {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #f39c12, #e74c3c);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .contact-subtitle {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: rgba(255, 255, 255, 0.8);
        }

        .contact-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        /* Contact Info Cards */
        .contact-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .contact-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .contact-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
            border-color: #f39c12;
        }

        .contact-icon {
            font-size: 2.5rem;
            color: #f39c12;
            margin-bottom: 15px;
        }

        .contact-card h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: white;
        }

        .contact-card p {
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            font-size: 0.95rem;
        }

        /* Form Styles */
        .contact-form-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
        }

        .contact-form-container h3 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            color: white;
            text-align: center;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            color: white;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            padding: 12px 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #f39c12;
            background: rgba(255, 255, 255, 0.1);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .error-message {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }

        .contact-submit-btn {
            background: linear-gradient(45deg, #f39c12, #e74c3c);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .contact-submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(243, 156, 18, 0.3);
        }

        .contact-submit-btn:disabled {
            background: #95a5a6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Status Message */
        .status-message {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
        }

        .success {
            background-color: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            border: 1px solid #2ecc71;
            display: block;
        }

        .error {
            background-color: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid #e74c3c;
            display: block;
        }

        /* Responsive Design */
        @media (max-width: 968px) {
            .contact-container {
                grid-template-columns: 1fr;
            }
            
            .contact-info {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .header-container {
                flex-direction: column;
                gap: 15px;
            }
            
            nav {
                flex-direction: column;
                width: 100%;
            }
            
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .user-actions {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .contact-section {
                padding: 30px;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .contact-info {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .contact-section {
                padding: 20px;
            }
            
            .contact-card {
                padding: 20px;
            }
        }
        footer {
        background: linear-gradient(45deg, #1a1a2e, #16213e);
        color: white;
        text-align: center;
        padding: 30px;
        margin-top: 60px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    footer a {
        color: #f39c12;
        text-decoration: none;
        margin: 0 10px;
        transition: color 0.3s ease;
    }

    footer a:hover {
        color: #e74c3c;
        text-decoration: underline;
    }
    </style>
</head>
<body>
    <div id="storeContent">
        <header>
            <div class="header-container">
                <div class="logo" onclick="window.location.href='index.html'">
                    <img src="" alt="Motion Coffee House Logo" width="100" height="100">
                    <h1> Motion Coffee House</h1>
                </div>
                <nav>
                    <div class="nav-links">
                        <a href="index.html"> Home </a>
                        <a href="about.html"> About </a>
                        <a href="menu.html"> Menu </a>
                        <a href="gallery.html"> Gallery </a>
                        <a href="contact.html"> Contact </a>
                    </div>
                    <div class="user-action">
                        <div class="user-info">
                            <i class="fas fa-user-circle"></i>
                            <span class="user-name"> Welcome, Guest</span>
                        </div>
                    </div>
                </nav>
            </div>
        </header>

        <div class="contact-form-container">
            <h3> Send Us A Message</h3>
            <form id="contact-form" class="contact-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="name"> Full Name *</label>
                        <input type="text" id="name" name="name" required placeholder="Your Full Name">
                        <div class="error-message" id="name-error"> Please enter your full name</div>
                    </div>

                    <div class="form-group">
                        <label for="email"> Email Address *</label>
                        <input type="email" id="email" name="email" required placeholder="Your Email Address">
                        <div class="error-message" id="email-error"> Please enter email address</div>
                    </div>

                    <div class=" form-row">
                        <div class="form-group">
                            <label for="title"> Subject *</label>
                            <input type="text" id="title" required placeholder="What Is This Regarding?">
                            <div class="error-message" id="subject-error"> Please enter a subject </div>
                        </div>

                        <div class="form-group">
                            <label for="phone"> Phone *</label>
                            <input type="text" id="phone" name="phone" required placeholder="Enter Your Phone Number">
                            <div class="error-message" id="phone-error"> Please enter a valid phone number</div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="message"> Message *</label>
                        <textarea id="message" name="message" required placeholder="Please Enter Your Message Here...."></textarea>
                        <div class="error-message" id="message-error"> Please enter your message</div>
                    </div>

                    <button type="submit" class="contact-submit-btn" id="submit-btn">
                        <span id="btn-text"> Send Message</span>
                        <span id="btn-spinner" style="display: none;"> Sending...</span>
                    </button>
                </div>
            </form>
        </div>
   <footer>
        <p>&copy; 2026 Motion Coffee House. All rights reserved</p>
    </footer>
        </main>
    </div>
</body>
</html>
