<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> page title | Motion Coffee House</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        header {
            background: #16213e;
            color: white;
            padding: 15px o;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .logo img {
            height: 50px;
            width: auto;
            border-radius: 8px;
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: #e74c3c;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-animation-fill-color: transparent;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: aqua;
            text-decoration: none;
            font-weight: 500;
            padding: 8px 15px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            background: rgba(243, 156, 18, 0.2);
            color: chocolate;
        }

        .nav-links a[href="index.html"],
        .nav-links a[href="about"]
        .nav-links a[href="menu"],
        .nav-links a[href="gallery.html"],
        .nav-links a[ href="contact.html"],{
            position: relative;
            font-weight:600;
            border-radius: 5px;
        }

        .nav-links a[href="index.html"],
        .nav-links a[href="#home"],
        .nav-links a[href="about"]{
            background: rgba(52, 152, 219, 0.1);
        }

        .nav-links a[href="menu.html"],
        .nav-links a[href="contact.html"]{
            background: rgba(243, 156, 18, 0.1);
        }

        .nav-links a[href="index.html"]::before,
        .nav-links a[href="#home"]::before {
            content: "\f015"; /*home icon*/
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            margin-right: 5px;
            font-size: 0.9rem;
            color: aqua;
        }

        .nav-links a[href="about.html"]::before {
        content: "\f2bb"; /* box icon */
        font-family: "Font Awesome 6 Free";
        font-weight: 900;
        margin-right: 5px;
        font-size: 0.9rem;
        color: #2ecc71;
    }

        .nav-links a[href="menu.html"]::before {
             content: "\f466";  /* info-circle icon*/
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            margin-right: 5px;
            font-size: 0.9rem;
            color: cadetblue;
        }

         .nav-links a[href="gallery.html"]::before {
            content: "\f2bb"; /* info-circle icon*/
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            margin-right: 5px;
            font-size: 0.9rem;
            color: cornflowerblue;
        }

         .nav-links a[href="contact.html"]::before {
            content: "\f095"; /* phone icon*/
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            margin-right: 5px;
            font-size: 0.9rem;
            color: cyan;
        }

        footer {
        background: linear-gradient(45deg, #1a1a2e, #16213e);
        color: white;
        text-align: center;
        padding: 30px;
        margin-top: 60px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    footer a {
        color: #f39c12;
        text-decoration: none;
        margin: 0 10px;
        transition: color 0.3s ease;
    }

    footer a:hover {
        color: #e74c3c;
        text-decoration: underline;
    }
    </style>
</head>
